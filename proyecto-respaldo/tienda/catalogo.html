<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tienda IA - Catálogo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { brand: '#E8742C', azul: '#1F3A5F' }
    }
  }
}
</script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="#" class="text-2xl font-bold text-azul">Tienda<span class="text-brand">IA</span></a>
    <button id="btnCarrito" class="relative p-2 hover:bg-gray-100 rounded-lg" aria-label="Abrir carrito">
      🛒
      <span id="contadorCarrito" class="absolute -top-1 -right-1 bg-brand text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
    </button>
  </div>
</nav>

<!-- Hero corto -->
<header class="bg-azul text-white py-12">
  <div class="max-w-7xl mx-auto px-4 text-center">
    <h1 class="text-4xl font-bold mb-2">Nuestro catálogo</h1>
    <p class="text-gray-300">Productos generados con Claude IA</p>
  </div>
</header>

<!-- Spinner / Error -->
<div id="estado" class="max-w-7xl mx-auto px-4 py-8 text-center"></div>

<!-- Catálogo -->
<main class="max-w-7xl mx-auto px-4 py-8">
  <div id="catalogo" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
</main>

<!-- Modal carrito -->
<div id="modalCarrito" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl max-w-lg w-full p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-2xl font-bold text-azul">Tu carrito</h2>
      <button id="cerrarModal" class="text-2xl">×</button>
    </div>
    <div id="contenidoCarrito" class="max-h-96 overflow-y-auto"></div>
    <div class="mt-4 pt-4 border-t flex justify-between items-center">
      <span class="font-bold">Total: S/ <span id="totalCarrito">0.00</span></span>
      <div class="space-x-2">
        <button id="vaciarCarrito" class="px-3 py-2 bg-gray-200 rounded">Vaciar</button>
        <button class="px-3 py-2 bg-brand text-white rounded">Comprar</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-6 right-6 bg-azul text-white px-4 py-3 rounded-lg shadow-lg"></div>

<script>
const $ = sel => document.querySelector(sel);

// ===== CARRITO =====
let carrito = JSON.parse(localStorage.getItem('carrito') || '[]');

function guardarCarrito() {
  localStorage.setItem('carrito', JSON.stringify(carrito));
  $('#contadorCarrito').textContent = carrito.reduce((s, i) => s + i.cantidad, 0);
}

function agregarAlCarrito(producto) {
  const existente = carrito.find(p => p.id === producto.id);
  if (existente) existente.cantidad += 1;
  else carrito.push({ ...producto, cantidad: 1 });
  guardarCarrito();
  mostrarToast('Producto agregado al carrito');
}

function mostrarToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2000);
}

function renderCarrito() {
  const cont = $('#contenidoCarrito');
  if (carrito.length === 0) {
    cont.innerHTML = '<p class="text-gray-500 text-center py-8">Tu carrito está vacío</p>';
    $('#totalCarrito').textContent = '0.00';
    return;
  }
  let total = 0;
  cont.innerHTML = carrito.map(p => {
    const subtotal = p.precio * p.cantidad;
    total += subtotal;
    return `<div class="flex justify-between py-2 border-b">
      <div><div class="font-medium">${p.nombre}</div><div class="text-sm text-gray-500">${p.cantidad} × S/ ${Number(p.precio).toFixed(2)}</div></div>
      <div class="font-bold">S/ ${subtotal.toFixed(2)}</div>
    </div>`;
  }).join('');
  $('#totalCarrito').textContent = total.toFixed(2);
}

$('#btnCarrito').onclick = () => { renderCarrito(); $('#modalCarrito').classList.remove('hidden'); };
$('#cerrarModal').onclick = () => $('#modalCarrito').classList.add('hidden');
$('#vaciarCarrito').onclick = () => { carrito = []; guardarCarrito(); renderCarrito(); };

// ===== CARGAR PRODUCTOS =====
async function cargarProductos() {
  const estado = $('#estado');
  estado.innerHTML = '<div class="inline-block w-8 h-8 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>';

  try {
    const res = await fetch('productos.php');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    estado.innerHTML = '';
    $('#catalogo').innerHTML = data.productos.map(p => `
      <div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">
        <div class="aspect-square bg-gray-100 flex items-center justify-center text-6xl">📦</div>
        <div class="p-4">
          <div class="text-xs text-brand font-semibold uppercase">${p.categoria}</div>
          <h3 class="font-bold mt-1 line-clamp-2">${p.nombre}</h3>
          <p class="text-sm text-gray-600 mt-1 line-clamp-2">${p.descripcion}</p>
          <div class="mt-3 flex items-center justify-between">
            <span class="text-xl font-bold text-azul">S/ ${Number(p.precio).toFixed(2)}</span>
            <button onclick='agregarAlCarrito(${JSON.stringify(p).replace(/'/g, "\\'")})' class="px-3 py-2 bg-brand text-white rounded-lg hover:bg-orange-600 transition">Agregar</button>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    estado.innerHTML = '<div class="bg-red-100 text-red-800 p-4 rounded">No se pudieron cargar los productos. ¿MySQL está activo?</div>';
  }
}

guardarCarrito();
cargarProductos();
</script>

</body>
</html>
